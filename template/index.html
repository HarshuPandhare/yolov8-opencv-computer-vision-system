<!DOCTYPE html>
<html>

<head>

<title>AI Vision Detection System</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: #080c14;
  font-family: 'Rajdhani', sans-serif;
  text-align: center;
  min-height: 100vh;
  overflow-x: hidden;
  color: #e0eaff;
}

/* Animated grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0, 200, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 200, 255, 0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* Glow orbs */
body::after {
  content: '';
  position: fixed;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 800px;
  height: 400px;
  background: radial-gradient(ellipse, rgba(0, 140, 255, 0.08) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  padding: 40px 20px 60px;
}

/* Header */
.header {
  margin-bottom: 10px;
}

.header .badge {
  display: inline-block;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: 3px;
  color: #00c8ff;
  text-transform: uppercase;
  border: 1px solid rgba(0, 200, 255, 0.3);
  padding: 4px 14px;
  border-radius: 20px;
  margin-bottom: 16px;
  background: rgba(0, 200, 255, 0.05);
}

h1 {
  font-size: clamp(26px, 4vw, 42px);
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  background: linear-gradient(135deg, #ffffff 0%, #00c8ff 50%, #0070ff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}

.subtitle {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  color: rgba(0, 200, 255, 0.5);
  letter-spacing: 4px;
  margin-bottom: 40px;
}

/* Status bar */
.status-bar {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-bottom: 36px;
  flex-wrap: wrap;
}

.status-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: rgba(180, 210, 255, 0.5);
  letter-spacing: 1px;
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #00ff88;
  box-shadow: 0 0 8px #00ff88;
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Buttons */
.controls {
  display: flex;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 36px;
}

button {
  position: relative;
  padding: 12px 28px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  border: 1px solid rgba(0, 150, 255, 0.35);
  border-radius: 4px;
  background: rgba(0, 100, 255, 0.08);
  color: #a0c8ff;
  cursor: pointer;
  transition: all 0.25s ease;
  overflow: hidden;
}

button::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(0, 150, 255, 0.15), rgba(0, 200, 255, 0.05));
  opacity: 0;
  transition: opacity 0.25s;
}

button::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, #00c8ff, transparent);
  transform: scaleX(0);
  transition: transform 0.3s ease;
}

button:hover {
  border-color: rgba(0, 200, 255, 0.7);
  color: #ffffff;
  box-shadow: 0 0 20px rgba(0, 150, 255, 0.2), inset 0 0 20px rgba(0, 150, 255, 0.05);
  transform: translateY(-1px);
}

button:hover::before { opacity: 1; }
button:hover::after { transform: scaleX(1); }

button.active {
  border-color: #00c8ff;
  color: #ffffff;
  background: rgba(0, 150, 255, 0.15);
  box-shadow: 0 0 24px rgba(0, 200, 255, 0.25);
}

/* Camera box */
.camera-box {
  display: flex;
  justify-content: center;
  margin-top: 10px;
}

.video-wrapper {
  position: relative;
  display: inline-block;
}

/* Corner brackets */
.video-wrapper::before,
.video-wrapper::after {
  content: '';
  position: absolute;
  width: 24px;
  height: 24px;
  z-index: 2;
  pointer-events: none;
}

.video-wrapper::before {
  top: -4px; left: -4px;
  border-top: 2px solid #00c8ff;
  border-left: 2px solid #00c8ff;
  box-shadow: -2px -2px 8px rgba(0,200,255,0.3);
}

.video-wrapper::after {
  bottom: -4px; right: -4px;
  border-bottom: 2px solid #00c8ff;
  border-right: 2px solid #00c8ff;
  box-shadow: 2px 2px 8px rgba(0,200,255,0.3);
}

.corner-br, .corner-tl-inner {
  position: absolute;
  width: 24px;
  height: 24px;
  z-index: 2;
  pointer-events: none;
}

.corner-br {
  top: -4px; right: -4px;
  border-top: 2px solid #00c8ff;
  border-right: 2px solid #00c8ff;
  box-shadow: 2px -2px 8px rgba(0,200,255,0.3);
}

.corner-tl-inner {
  bottom: -4px; left: -4px;
  border-bottom: 2px solid #00c8ff;
  border-left: 2px solid #00c8ff;
  box-shadow: -2px 2px 8px rgba(0,200,255,0.3);
}

/* Scan line animation */
.scan-line {
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(0,200,255,0.6), transparent);
  animation: scan 3s linear infinite;
  z-index: 3;
  pointer-events: none;
}

@keyframes scan {
  0%   { top: 0%; opacity: 0; }
  5%   { opacity: 1; }
  95%  { opacity: 1; }
  100% { top: 100%; opacity: 0; }
}

#video {
  width: 600px;
  max-width: 90vw;
  border-radius: 4px;
  border: 1px solid rgba(0, 150, 255, 0.3);
  display: block;
  background: #0a0f1a;
  box-shadow:
    0 0 0 1px rgba(0, 200, 255, 0.05),
    0 20px 60px rgba(0, 0, 0, 0.6),
    0 0 40px rgba(0, 100, 255, 0.1);
}

/* Info bar below video */
.info-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  max-width: 600px;
  width: 90vw;
  margin: 12px auto 0;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: rgba(0, 200, 255, 0.4);
  letter-spacing: 1px;
}

</style>

</head>

<body>

<div class="container">

  <div class="header">
    <div class="badge">◈ Neural Vision v2.4</div>
    <h1>AI Vision Detection System</h1>
    <div class="subtitle">REAL-TIME · MULTI-MODAL · COMPUTER VISION</div>
  </div>

  <div class="status-bar">
    <div class="status-item"><span class="status-dot"></span>SYSTEM ONLINE</div>
    <div class="status-item"><span class="status-dot" style="background:#00aaff;box-shadow:0 0 8px #00aaff"></span>MODEL LOADED</div>
    <div class="status-item"><span class="status-dot" style="background:#ffaa00;box-shadow:0 0 8px #ffaa00;animation-delay:.7s"></span>STREAM READY</div>
  </div>

  <div class="controls">
    <button id="btn-object" onclick="startObject()">Object Detection</button>
    <button id="btn-eye"    onclick="startEye()">Eye Detection</button>
    <button id="btn-vehicle" onclick="startVehicle()">Vehicle Detection</button>
  </div>

  <div class="camera-box">
    <div class="video-wrapper">
      <div class="corner-br"></div>
      <div class="corner-tl-inner"></div>
      <div class="scan-line"></div>
      <img id="video" src="http://127.0.0.1:5000/object">
    </div>
  </div>

  <div class="info-bar">
    <span id="mode-label">MODE: OBJECT</span>
    <span>RES 640×480</span>
    <span id="fps-label">LIVE</span>
  </div>

</div>

<script>

function setActive(id) {
  ['btn-object','btn-eye','btn-vehicle'].forEach(b => document.getElementById(b).classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startObject(){
  document.getElementById("video").src="http://127.0.0.1:5000/object?" + new Date().getTime();
  document.getElementById("mode-label").textContent = "MODE: OBJECT";
  setActive('btn-object');
}

function startEye(){
  document.getElementById("video").src="http://127.0.0.1:5000/eye?" + new Date().getTime();
  document.getElementById("mode-label").textContent = "MODE: EYE";
  setActive('btn-eye');
}

function startVehicle(){
  document.getElementById("video").src="http://127.0.0.1:5000/vehicle?" + new Date().getTime();
  document.getElementById("mode-label").textContent = "MODE: VEHICLE";
  setActive('btn-vehicle');
}

// Set first button active on load
document.getElementById('btn-object').classList.add('active');

</script>

</body>
</html>
